.sorry-page {

@keyframes bgShift { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
.sorry-title { font-size: clamp(2em, 8vw, 4em); margin: 20px 0 30px 0; text-shadow: 0 0 40px #FF1493; animation: glowPulse 2s infinite alternate; position: relative; }

@keyframes fadeInUp { 0% { opacity: 0; transform: translateY(50px); } 100% { opacity: 1; transform: translateY(0); } }
.videos-section, .videos-section-lower { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 30px 0; width: 100%; }
.video-item { width: clamp(200px, 30vw, 300px); height: clamp(150px, 22vw, 225px); object-fit: cover; border-radius: 15px; box-shadow: 0 10px 30px rgba(255,20,147,0.5); }

#sorry-rain { position: relative; height: 400px; width: 100%; overflow: hidden; margin: 40px 0; }
.sorry-drop { 
    position: absolute; 
    font-size: clamp(0.8em, 2vw, 1.2em); color: rgba(255,255,255,0.9); 
    white-space: nowrap; 
    animation: rain-fall linear infinite; 
    pointer-events: none; 
}
.sorry-drop .sorry-text { margin-right: 5px; }
.sorry-drop .heart-text { font-size: 0.9em; }
@keyframes rain-fall { 0% { transform: translateY(-100vh) rotate(15deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(15deg); opacity: 0; } }
/* Animations removed for static boxes */
.sorry-word::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 70%); opacity: 0; }
@keyframes shine { 0% { transform: rotate(0deg) translateX(-100%) translateY(-100%); opacity: 0; } 50% { opacity: 1; } 100% { transform: rotate(360deg) translateX(100%) translateY(100%); opacity: 0; } }
.sorry-word:hover { transform: scale(1.3) rotate(360deg) translateY(-20px); box-shadow: 0 30px 80px rgba(255,20,147,1); }
/* Static boxes - no delays needed */
.back-btn { background: linear-gradient(45deg, #FF69B4, #FF1493); color: white; border: none; padding: 20px 40px; border-radius: 50px; font-size: 1.5em; cursor: pointer; margin-top: 40px; box-shadow: 0 15px 40px rgba(255,105,180,0.5); transition: all 0.3s; }

.password-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8); z-index: 9999; display: flex; align-items: center; justify-content: center; }
.password-box { background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(255,182,193,0.9)); padding: 50px; border-radius: 30px; box-shadow: 0 30px 80px rgba(0,0,0,0.6); text-align: center; max-width: 400px; }
.password-box h2 { color: #FF1493; margin-bottom: 30px; font-size: 2em; }
.password-box input { padding: 20px; margin: 20px 0; border: 4px solid #FF69B4; border-radius: 20px; font-size: 2em; width: 250px; text-align: center; font-weight: bold; letter-spacing: 5px; }

function createSorryRain() {
